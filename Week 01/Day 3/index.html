<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Anchor tag</h2>
    <a href="https://google.com" target="_blank">This is link</a>
    <h2>Img tag</h2>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtWo-Q7gRaHozTOE9weW_SSTYv_ulYvK4RYQ&s" alt="Description of the image" height="100px" width="100px"/>
    <h2>Form tag</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" minlength="3" maxlength="100" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="country">Select your country:</label>
        <select name="country" required>
<option value="">Select your country</option>
<option value="usa">USA</option>
<option value="canada">Canada</option>
        </select>

        <br/>
                <br />

<fieldset>
  <legend>Select your gender</legend>
<input type="radio" id="male" name="gender" value="male" checked>
<label for="male">Male</label>

<input type="radio" id="female" name="gender" value="female">
<label for="female">Female</label>
</fieldset>

        <br />
        <br />

        <button>Submit</button>
    </form>
</body>
</html>
