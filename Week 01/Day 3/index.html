<!-- Hyperlinks, attribute, image, form, input, Radio, fieldset, Button -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="https://www.google.com" target="_blank">This is link</a>
    <br/>
    <br/>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRVJABkE1lLJtug8FbDhltmdwvcLJM6m6l1-A&s" alt="Students taking lecture while holding laptops" height="300px" width="300px"/>
    <br>

    <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required/>
        <br>
        <br>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
        <br>
        <br>

        <label for="dropdown">Choose an option:</label>
        <select id="dropdown" name="dropdown">
            <option value="">--Please choose an option--</option>
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select>
<br>
<br>
<fieldset>
    <legend>Select your gender</legend>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>

    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>
</fieldset>

        <br>
        <br>
        <button>Submit</button>
    </form>
</body>
</html>
